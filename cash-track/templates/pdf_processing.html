{% extends "base.html" %}

{% block title %}Procesando PDF - AurefiQ{% endblock %}

{% block content %}
<div class="page-container">
    <div class="form-card" style="max-width: 600px; margin: 50px auto;">
        <h2 style="text-align: center; margin-bottom: 30px;">📄 Procesando Resumen de Tarjeta</h2>

        <div style="margin-bottom: 20px;">
            <div style="background: #e5e7eb; height: 30px; border-radius: 15px; overflow: hidden; position: relative;">
                <div id="progressBar" style="background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); height: 100%; width: 0%; transition: width 0.3s ease; display: flex; align-items: center; justify-content: center;">
                    <span id="progressText" style="color: white; font-weight: bold; font-size: 0.9rem; position: absolute; left: 50%; transform: translateX(-50%);">0%</span>
                </div>
            </div>
        </div>

        <div id="statusMessage" style="text-align: center; color: var(--text-muted); margin-bottom: 20px; min-height: 24px;">
            Iniciando procesamiento...
        </div>

        <div id="spinner" style="text-align: center; margin: 30px 0;">
            <div style="border: 4px solid #f3f4f6; border-top: 4px solid #667eea; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
        </div>

        <div id="completeActions" style="display: none; text-align: center; margin-top: 30px;">
            <p style="color: #10b981; font-size: 1.2rem; font-weight: bold; margin-bottom: 20px;">
                ✅ <span id="completedCount"></span> gastos importados exitosamente
            </p>
            <a href="{{ url_for('expenses.expenses_all') }}" class="btn btn-primary btn-large">
                Ver Todos los Gastos Importados
            </a>
        </div>
    </div>
</div>

<style>
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>

<script>
const jobId = "{{ job_id }}";
const eventSource = new EventSource(`/process_pdf/${jobId}`);

eventSource.onmessage = function(event) {
    const data = JSON.parse(event.data);

    if (data.error) {
        document.getElementById('statusMessage').textContent = `❌ Error: ${data.error}`;
        document.getElementById('statusMessage').style.color = '#ef4444';
        document.getElementById('spinner').style.display = 'none';
        eventSource.close();
        return;
    }

    if (data.progress !== undefined) {
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        progressBar.style.width = data.progress + '%';
        progressText.textContent = data.progress + '%';
    }

    if (data.message) {
        document.getElementById('statusMessage').textContent = data.message;
    }

    if (data.complete) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('statusMessage').style.display = 'none';
        document.getElementById('completedCount').textContent = data.count;
        document.getElementById('completeActions').style.display = 'block';
        eventSource.close();
    }
};

eventSource.onerror = function() {
    document.getElementById('statusMessage').textContent = '❌ Error de conexión';
    document.getElementById('statusMessage').style.color = '#ef4444';
    document.getElementById('spinner').style.display = 'none';
    eventSource.close();
};
</script>
{% endblock %}
